<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Meditation · local tracker</title>
  <style>
    /* === FRESH VISUAL STYLE — DIFFERENCES ARE OBVIOUS === */
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background: #f4f6fb;
      padding: 18px 14px 30px;
      max-width: 700px;
      margin: 0 auto;
      color: #1e293b;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(145deg, #0f2b3d, #1a4a6f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }
    .sub {
      color: #3a5e7a;
      font-weight: 400;
      margin-bottom: 20px;
      border-bottom: 2px dashed #b7d3e8;
      padding-bottom: 12px;
    }
    /* cards with distinct shadows */
    .card {
      background: #ffffffdd;
      backdrop-filter: blur(4px);
      border-radius: 32px;
      padding: 22px 20px;
      margin-bottom: 22px;
      box-shadow: 0 15px 30px -10px rgba(0,50,80,0.15), 0 4px 8px rgba(0,20,40,0.05);
      border: 1px solid rgba(200,220,240,0.6);
    }
    .badge {
      background: #1e3a5f;
      color: white;
      padding: 8px 20px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.1rem;
      box-shadow: 0 6px 12px #1e3a5f30;
    }
    .row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    input, textarea {
      border: 1.5px solid #cbd5e1;
      border-radius: 40px;
      padding: 14px 20px;
      font-size: 1rem;
      background: #ffffff;
      outline: none;
      width: 100%;
      transition: 0.15s;
    }
    input:focus, textarea:focus {
      border-color: #1d4ed8;
      box-shadow: 0 0 0 4px #a5c9ff;
    }
    textarea { border-radius: 28px; }
    button {
      background: #0b2b44;
      border: none;
      color: white;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 60px;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 8px 16px #0b2b4430;
      transition: 0.1s;
      border: 1px solid #143e60;
      white-space: nowrap;
    }
    button.small {
      background: white;
      color: #0b2b44;
      border: 2px solid #aac7e0;
      box-shadow: none;
      padding: 10px 22px;
      font-size: 1rem;
      font-weight: 500;
    }
    button.small:hover { background: #e4f0fe; }
    .danger {
      background: white;
      color: #b22222;
      border: 2px solid #fbb5b5;
      box-shadow: none;
    }
    /* month nav — obviously new */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #deecf9;
      padding: 8px 12px;
      border-radius: 60px;
      margin: 12px 0 18px;
    }
    .month-nav span {
      font-size: 1.6rem;
      font-weight: 650;
      color: #0a3147;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin: 8px 0 14px;
    }
    .weekday {
      font-weight: 700;
      color: #1f5377;
      font-size: 0.9rem;
      text-align: center;
    }
    .day-cell {
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eaf1fa;
      border-radius: 20px;
      font-weight: 600;
      font-size: 1.1rem;
      border: 2px solid transparent;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 4px 6px #b0c7db50;
    }
    .day-cell.low { background: #c8e9fa; color: #024d72; }
    .day-cell.medium { background: #7ac7f5; color: #022b41; }
    .day-cell.high { background: #1f6aa5; color: white; }
    .day-cell.today { border-color: #000; border-width: 3px; background: #fff7e0; }
    .day-cell.selected { outline: 4px solid #004c99; outline-offset: 3px; }
    .empty-cell { background: transparent; box-shadow: none; }

    /* editor panel — very distinct */
    .editor-panel {
      background: #e7f0fc;
      border-radius: 40px;
      padding: 26px 22px;
      margin: 16px 0 22px;
      border: 3px solid #3478b0;
      box-shadow: 0 18px 25px -10px #264e73;
    }
    .all-records {
      background: #fefefe;
      border-radius: 36px;
      padding: 22px;
      max-height: 420px;
      overflow-y: auto;
      border: 2px solid #85b9e6;
    }
    .record-item {
      background: #f0f8ff;
      border-radius: 30px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .flex { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    .mt-3 { margin-top: 18px; }
    .text-sm { font-size: 0.95rem; color: #0d3e5e; font-weight: 500; }
  </style>
</head>
<body>
  <h1>🧘 MEDITATION</h1>
  <div class="sub">tap any day — edit minutes / notes</div>

  <!-- TODAY ADD (remains) -->
  <div class="card">
    <div class="row">
      <input type="number" id="todayMinutes" value="12" placeholder="minutes" min="1" style="flex:3;">
      <button id="addTodayBtn" style="flex:2;">➕ ADD TODAY</button>
    </div>
  </div>

  <!-- STREAK + MONTH TOTAL (big badges) -->
  <div class="card" style="padding: 16px 20px;">
    <div class="flex" style="justify-content: space-between;">
      <span class="badge" id="streakDisplay">⚡ 0 days</span>
      <span class="badge" id="monthTotalDisplay">📅 0 min</span>
    </div>
  </div>

  <!-- MONTH NAVIGATION — NEW FEATURE (unmissable) -->
  <div class="card" style="padding: 14px 18px;">
    <div class="month-nav">
      <button class="small" id="prevMonthBtn">◀ PREV</button>
      <span id="monthYearDisplay">MAY 2025</span>
      <button class="small" id="nextMonthBtn">NEXT ▶</button>
    </div>

    <!-- calendar grid injected -->
    <div class="calendar-grid" id="calendarGrid"></div>

    <!-- action buttons: all records & export -->
    <div class="flex" style="justify-content: space-between; margin-top: 18px;">
      <button class="small" id="viewAllBtn">📋 ALL RECORDS</button>
      <button class="small" id="exportCsvBtn">⬇️ EXPORT CSV</button>
    </div>
  </div>

  <!-- EDITOR PANEL appears only when a day is tapped (obvious new area) -->
  <div id="editorContainer"></div>

  <!-- ALL DATA / RECORDS container -->
  <div id="allDataContainer"></div>

  <script>
    (function() {
      // ----------------------------------------------
      // data & state
      let data = JSON.parse(localStorage.getItem('meditationData')) || {};
      let currentYear = new Date().getFullYear();
      let currentMonth = new Date().getMonth();  // 0-11
      let selectedDateKey = null;

      // helpers (local date, no UTC)
      function formatLocal(year, month, day) {
        return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      }
      function todayKey() {
        const d = new Date();
        return formatLocal(d.getFullYear(), d.getMonth(), d.getDate());
      }

      // persist
      function save() {
        localStorage.setItem('meditationData', JSON.stringify(data));
        renderAll();
      }

      // streak (current)
      function streak() {
        let s = 0;
        let d = new Date();
        while (true) {
          const key = formatLocal(d.getFullYear(), d.getMonth(), d.getDate());
          if (data[key] && (data[key].minutes || 0) > 0) { s++; d.setDate(d.getDate()-1); }
          else break;
        }
        return s;
      }

      // monthly total (based on current view)
      function monthTotal() {
        let total = 0;
        Object.entries(data).forEach(([key, e]) => {
          const [y, m] = key.split('-').map(Number);
          if (y === currentYear && m-1 === currentMonth) total += e.minutes || 0;
        });
        return total;
      }

      // render calendar
      function renderCalendar() {
        const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        document.getElementById('monthYearDisplay').innerText = `${monthNames[currentMonth]} ${currentYear}`;

        const firstDay = new Date(currentYear, currentMonth, 1).getDay(); // 0 sun
        const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
        let html = '';
        ['SUN','MON','TUE','WED','THU','FRI','SAT'].forEach(w => html += `<div class="weekday">${w}</div>`);
        for (let i=0; i<firstDay; i++) html += `<div class="empty-cell"></div>`;

        for (let d=1; d<=daysInMonth; d++) {
          const key = formatLocal(currentYear, currentMonth, d);
          const entry = data[key];
          let cls = 'day-cell';
          if (entry && entry.minutes) {
            if (entry.minutes < 10) cls += ' low';
            else if (entry.minutes < 30) cls += ' medium';
            else cls += ' high';
          }
          if (key === todayKey()) cls += ' today';
          if (key === selectedDateKey) cls += ' selected';
          html += `<div class="${cls}" data-key="${key}" data-day="${d}">${d}</div>`;
        }
        document.getElementById('calendarGrid').innerHTML = html;
        document.querySelectorAll('.day-cell').forEach(cell => {
          cell.addEventListener('click', () => {
            const key = cell.dataset.key;
            if (!key) return;
            document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
            cell.classList.add('selected');
            selectedDateKey = key;
            openEditor(key);
          });
        });
      }

      // open editor (NEW feature clearly visible)
      function openEditor(key) {
        const entry = data[key] || { minutes:0, sessions:0, notes:'' };
        const container = document.getElementById('editorContainer');
        container.innerHTML = `
          <div class="editor-panel">
            <h2 style="margin-bottom: 14px; color:#0b2b44;">✏️ EDIT ${key}</h2>
            <label class="text-sm">🧘 minutes</label>
            <input type="number" id="editMinutes" value="${entry.minutes || 0}" min="0">
            <label class="text-sm mt-3">🔁 sessions count</label>
            <input type="number" id="editSessions" value="${entry.sessions || 0}" min="0">
            <label class="text-sm mt-3">📝 notes</label>
            <textarea id="editNotes" rows="2">${entry.notes || ''}</textarea>
            <div class="flex mt-3">
              <button id="saveEditBtn">💾 SAVE CHANGES</button>
              <button class="danger" id="deleteDayBtn">🗑️ DELETE DAY</button>
              <button class="small" id="closeEditorBtn">CLOSE</button>
            </div>
          </div>
        `;
        document.getElementById('saveEditBtn').addEventListener('click', () => { saveEdit(key); });
        document.getElementById('deleteDayBtn').addEventListener('click', () => { deleteDay(key); });
        document.getElementById('closeEditorBtn').addEventListener('click', () => {
          container.innerHTML = '';
          selectedDateKey = null;
          document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
        });
      }

      function saveEdit(key) {
        const minutes = parseInt(document.getElementById('editMinutes').value) || 0;
        const sessions = parseInt(document.getElementById('editSessions').value) || 0;
        const notes = document.getElementById('editNotes').value;
        data[key] = { minutes, sessions, notes };
        save();
        document.getElementById('editorContainer').innerHTML = '';
        selectedDateKey = key; // keep selection
      }

      function deleteDay(key) {
        delete data[key];
        if (selectedDateKey === key) selectedDateKey = null;
        document.getElementById('editorContainer').innerHTML = '';
        save();
      }

      // add today
      function addToday() {
        const inp = document.getElementById('todayMinutes');
        let m = parseInt(inp.value);
        if (isNaN(m) || m<1) m = 5;
        const key = todayKey();
        if (!data[key]) data[key] = { minutes:0, sessions:0, notes:'' };
        data[key].minutes += m;
        data[key].sessions += 1;
        inp.value = '';
        save();
      }

      // show all records (view all)
      function showAll() {
        const container = document.getElementById('allDataContainer');
        const sorted = Object.keys(data).sort().reverse();
        if (sorted.length===0) { container.innerHTML = '<div class="all-records">✨ no entries</div>'; return; }
        let html = '<div class="all-records"><h2 style="margin-bottom:14px;">📋 ALL RECORDS</h2>';
        sorted.forEach(date => {
          const e = data[date];
          html += `<div class="record-item"><strong>${date}</strong> · ${e.minutes} min · ${e.sessions} sess<br>📝 ${e.notes || '—'}</div>`;
        });
        html += '</div>';
        container.innerHTML = html;
      }

      // export CSV
      function exportCSV() {
        const rows = [['Date','Minutes','Sessions','Notes']];
        Object.keys(data).sort().forEach(date => {
          const e = data[date];
          rows.push([date, e.minutes||0, e.sessions||0, `"${(e.notes||'').replace(/"/g,'""')}"`]);
        });
        const csv = rows.map(r=>r.join(',')).join('\n');
        const blob = new Blob([csv],{type:'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `meditation_${currentYear}-${currentMonth+1}.csv`;
        a.click();
      }

      // hide all container when month changes (optional)
      function hideAll() { document.getElementById('allDataContainer').innerHTML = ''; }

      // main render
      function renderAll() {
        document.getElementById('streakDisplay').innerText = `⚡ ${streak()} day streak`;
        document.getElementById('monthTotalDisplay').innerText = `📅 ${monthTotal()} min`;
        renderCalendar();
        // re-open editor if needed
        if (selectedDateKey) {
          if (data[selectedDateKey]) openEditor(selectedDateKey);
          else { document.getElementById('editorContainer').innerHTML = ''; selectedDateKey = null; }
        } else document.getElementById('editorContainer').innerHTML = '';
      }

      // event listeners
      document.getElementById('addTodayBtn').addEventListener('click', addToday);
      document.getElementById('prevMonthBtn').addEventListener('click', ()=>{
        currentMonth--; if (currentMonth<0) { currentMonth=11; currentYear--; }
        hideAll(); renderAll();
      });
      document.getElementById('nextMonthBtn').addEventListener('click', ()=>{
        currentMonth++; if (currentMonth>11) { currentMonth=0; currentYear++; }
        hideAll(); renderAll();
      });
      document.getElementById('viewAllBtn').addEventListener('click', showAll);
      document.getElementById('exportCsvBtn').addEventListener('click', exportCSV);

      // initial render
      renderAll();
    })();
  </script>
</body>
</html>
