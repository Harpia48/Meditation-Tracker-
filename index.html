<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meditation Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  text-align: center;
  padding: 20px;
  background: #f4f4f4;
}
button {
  font-size: 18px;
  padding: 10px 20px;
  margin: 5px;
  border-radius: 12px;
  border: none;
  background: black;
  color: white;
}
input, textarea {
  width: 90%;
  padding: 10px;
  margin-top: 10px;
}
.calendar-day {
  padding: 6px;
  margin: 4px;
  display: inline-block;
  background: #ddd;
  border-radius: 8px;
  font-size: 12px;
}
</style>
</head>

<body>

<h1>Meditation</h1>

<p id="timer">00:00</p>
<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>

<h3>Add Note</h3>
<textarea id="noteInput" placeholder="How was your session?"></textarea>
<br>
<button onclick="saveNote()">Save Note</button>

<h3>Today</h3>
<p id="todayStats"></p>

<h3>Calendar</h3>
<div id="calendar"></div>

<script>

let startTime;
let timerInterval;

let data = JSON.parse(localStorage.getItem("meditationData")) || {};

function todayKey() {
  return new Date().toISOString().split("T")[0];
}

function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
}

function updateTimer() {
  let elapsed = Date.now() - startTime;
  let seconds = Math.floor(elapsed / 1000);
  let minutes = Math.floor(seconds / 60);
  seconds = seconds % 60;
  document.getElementById("timer").innerText =
    String(minutes).padStart(2, '0') + ":" +
    String(seconds).padStart(2, '0');
}

function stopTimer() {
  clearInterval(timerInterval);
  let elapsed = Date.now() - startTime;
  let minutes = Math.floor(elapsed / 60000);

  let key = todayKey();
  if (!data[key]) {
    data[key] = { minutes: 0, sessions: 0, notes: [] };
  }

  data[key].minutes += minutes;
  data[key].sessions += 1;

  localStorage.setItem("meditationData", JSON.stringify(data));
  render();
}

function saveNote() {
  let note = document.getElementById("noteInput").value;
  let key = todayKey();

  if (!data[key]) {
    data[key] = { minutes: 0, sessions: 0, notes: [] };
  }

  data[key].notes.push(note);
  document.getElementById("noteInput").value = "";

  localStorage.setItem("meditationData", JSON.stringify(data));
  render();
}

function render() {
  let key = todayKey();
  let today = data[key];

  if (today) {
    document.getElementById("todayStats").innerText =
      "Minutes: " + today.minutes +
      " | Sessions: " + today.sessions +
      " | Notes: " + today.notes.length;
  } else {
    document.getElementById("todayStats").innerText = "No sessions today";
  }

  renderCalendar();
}

function renderCalendar() {
  let calendarDiv = document.getElementById("calendar");
  calendarDiv.innerHTML = "";

  Object.keys(data).sort().forEach(date => {
    let day = document.createElement("div");
    day.className = "calendar-day";
    day.innerText = date + " (" + data[date].minutes + "m)";
    calendarDiv.appendChild(day);
  });
}

render();

</script>

</body>
</html>
