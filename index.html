<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meditation Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  text-align: center;
  padding: 20px;
  background: #f8f8f8;
  max-width: 650px;
  margin: auto;
}

h1 { margin-bottom: 10px; }

input, textarea {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 8px 14px;
  margin: 4px;
  border-radius: 8px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-top: 15px;
}

.weekday {
  font-size: 12px;
  font-weight: bold;
  opacity: 0.6;
}

.day {
  padding: 12px 0;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  background: #eaeaea;
}

.low { background: #d6eaff; }
.medium { background: #5bbcff; color:white; }
.high { background: #005fa3; color:white; }

.today {
  border: 2px solid black;
}

.selected {
  outline: 3px solid black;
}

.editor {
  margin-top: 15px;
  padding: 15px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.stats {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>Meditation</h1>

<h3>Add Session Today</h3>
<input type="number" id="todayMinutes" placeholder="Minutes">
<button onclick="addToday()">Add</button>

<div class="stats" id="stats"></div>

<h3>Calendar</h3>
<button onclick="showAllData()">View All Records</button>
<div class="calendar" id="calendar"></div>

<div id="editorContainer"></div>
<div id="allDataContainer"></div>

<script>

let data = JSON.parse(localStorage.getItem("meditationData")) || {};
let selectedDate = null;

function todayKey() {
  return new Date().toISOString().split("T")[0];
}

function save() {
  localStorage.setItem("meditationData", JSON.stringify(data));
  render();
}

function addToday() {
  let minutes = parseInt(document.getElementById("todayMinutes").value);
  if (!minutes) return;

  let key = todayKey();
  if (!data[key]) data[key] = { minutes: 0, sessions: 0, notes: "" };

  data[key].minutes += minutes;
  data[key].sessions += 1;

  document.getElementById("todayMinutes").value = "";
  save();
}

function calculateStreak() {
  let streak = 0;
  let d = new Date();

  while (true) {
    let key = d.toISOString().split("T")[0];
    if (data[key] && data[key].minutes > 0) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  return streak;
}

function monthlyMinutes() {
  let now = new Date();
  let total = 0;

  Object.keys(data).forEach(date => {
    let d = new Date(date);
    if (d.getMonth() === now.getMonth() &&
        d.getFullYear() === now.getFullYear())
      total += data[date].minutes;
  });

  return total;
}

function renderCalendar() {
  let cal = document.getElementById("calendar");
  cal.innerHTML = "";

  let weekdays = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  weekdays.forEach(w => {
    let div = document.createElement("div");
    div.className = "weekday";
    div.innerText = w;
    cal.appendChild(div);
  });

  let now = new Date();
  let year = now.getFullYear();
  let month = now.getMonth();

  let firstDay = new Date(year, month, 1).getDay();
  let daysInMonth = new Date(year, month+1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    cal.appendChild(document.createElement("div"));
  }

  for (let d = 1; d <= daysInMonth; d++) {
    let date = new Date(year, month, d);
    let key = date.toISOString().split("T")[0];

    let div = document.createElement("div");
    div.className = "day";
    div.innerText = d;

    if (data[key]) {
      let m = data[key].minutes;
      if (m < 10) div.classList.add("low");
      else if (m < 30) div.classList.add("medium");
      else div.classList.add("high");
    }

    if (key === todayKey()) div.classList.add("today");

    div.onclick = () => openEditor(key, div);
    cal.appendChild(div);
  }
}

function openEditor(key, element) {
  selectedDate = key;

  document.querySelectorAll(".day").forEach(d => d.classList.remove("selected"));
  element.classList.add("selected");

  let entry = data[key] || { minutes: 0, sessions: 0, notes: "" };

  let editor = `
    <div class="editor">
      <h3>Edit ${key}</h3>
      <label>Minutes</label>
      <input type="number" id="editMinutes" value="${entry.minutes}">
      <label>Sessions</label>
      <input type="number" id="editSessions" value="${entry.sessions}">
      <label>Notes</label>
      <textarea id="editNotes">${entry.notes}</textarea>
      <button onclick="saveEdit()">Save</button>
      <button onclick="deleteDay()">Delete</button>
    </div>
  `;

  document.getElementById("editorContainer").innerHTML = editor;
}

function saveEdit() {
  let minutes = parseInt(document.getElementById("editMinutes").value) || 0;
  let sessions = parseInt(document.getElementById("editSessions").value) || 0;
  let notes = document.getElementById("editNotes").value;

  data[selectedDate] = { minutes, sessions, notes };
  save();
}

function deleteDay() {
  delete data[selectedDate];
  document.getElementById("editorContainer").innerHTML = "";
  save();
}

function showAllData() {
  let container = document.getElementById("allDataContainer");
  container.innerHTML = "";

  let sorted = Object.keys(data).sort();

  if (sorted.length === 0) {
    container.innerHTML = "<p>No data yet.</p>";
    return;
  }

  let html = "<div class='editor'><h3>All Records</h3>";

  sorted.forEach(date => {
    let entry = data[date];
    html += `
      <div style="margin-bottom:10px;">
        <strong>${date}</strong><br>
        Minutes: ${entry.minutes}<br>
        Sessions: ${entry.sessions}<br>
        Notes: ${entry.notes || "-"}
      </div>
      <hr>
    `;
  });

  html += "</div>";
  container.innerHTML = html;
}

function render() {
  document.getElementById("stats").innerText =
    "Streak: " + calculateStreak() +
    " days | This month: " + monthlyMinutes() + " min";

  renderCalendar();
}

render();

</script>

</body>
</html>
