<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meditation Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  text-align: center;
  padding: 20px;
  background: #f5f5f5;
}

h1 { margin-bottom: 5px; }

button {
  font-size: 16px;
  padding: 8px 16px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  background: black;
  color: white;
}

textarea {
  width: 90%;
  padding: 10px;
  margin-top: 10px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  margin-top: 15px;
}

.day {
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
}

.low { background: #d6eaff; }
.medium { background: #5bbcff; color:white; }
.high { background: #005fa3; color:white; }

.selected {
  outline: 3px solid black;
}

.stats {
  margin-top: 15px;
}

</style>
</head>

<body>

<h1>Meditation</h1>
<p id="timer">00:00</p>
<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>

<div class="stats">
<p id="todayStats"></p>
<p id="streak"></p>
<p id="monthlyTotal"></p>
</div>

<h3>Add Note</h3>
<textarea id="noteInput" placeholder="Reflection..."></textarea>
<br>
<button onclick="saveNote()">Save Note</button>

<h3>Calendar</h3>
<div class="calendar" id="calendar"></div>

<div id="dayDetails"></div>

<script>

let startTime;
let timerInterval;
let selectedDate = null;

let data = JSON.parse(localStorage.getItem("meditationData")) || {};

function todayKey() {
  return new Date().toISOString().split("T")[0];
}

function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
}

function updateTimer() {
  let elapsed = Date.now() - startTime;
  let seconds = Math.floor(elapsed / 1000);
  let minutes = Math.floor(seconds / 60);
  seconds %= 60;
  document.getElementById("timer").innerText =
    String(minutes).padStart(2,'0') + ":" +
    String(seconds).padStart(2,'0');
}

function stopTimer() {
  clearInterval(timerInterval);
  let minutes = Math.floor((Date.now() - startTime) / 60000);

  let key = todayKey();
  if (!data[key]) data[key] = { minutes: 0, sessions: 0, notes: [] };

  data[key].minutes += minutes;
  data[key].sessions += 1;

  save();
}

function saveNote() {
  let note = document.getElementById("noteInput").value;
  if (!note) return;

  let key = todayKey();
  if (!data[key]) data[key] = { minutes: 0, sessions: 0, notes: [] };

  data[key].notes.push(note);
  document.getElementById("noteInput").value = "";
  save();
}

function save() {
  localStorage.setItem("meditationData", JSON.stringify(data));
  render();
}

function calculateStreak() {
  let streak = 0;
  let d = new Date();

  while (true) {
    let key = d.toISOString().split("T")[0];
    if (data[key] && data[key].minutes > 0) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  return streak;
}

function monthlyMinutes() {
  let now = new Date();
  let month = now.getMonth();
  let year = now.getFullYear();
  let total = 0;

  Object.keys(data).forEach(date => {
    let d = new Date(date);
    if (d.getMonth() === month && d.getFullYear() === year)
      total += data[date].minutes;
  });

  return total;
}

function renderCalendar() {
  let cal = document.getElementById("calendar");
  cal.innerHTML = "";

  let now = new Date();
  let year = now.getFullYear();
  let month = now.getMonth();

  let firstDay = new Date(year, month, 1).getDay();
  let daysInMonth = new Date(year, month+1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    let empty = document.createElement("div");
    cal.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    let date = new Date(year, month, d);
    let key = date.toISOString().split("T")[0];

    let div = document.createElement("div");
    div.className = "day";
    div.innerText = d;

    if (data[key]) {
      let m = data[key].minutes;
      if (m < 10) div.classList.add("low");
      else if (m < 30) div.classList.add("medium");
      else div.classList.add("high");
    }

    div.onclick = () => selectDay(key, div);
    cal.appendChild(div);
  }
}

function selectDay(key, element) {
  selectedDate = key;

  document.querySelectorAll(".day").forEach(d => d.classList.remove("selected"));
  element.classList.add("selected");

  let info = data[key];
  let details = document.getElementById("dayDetails");

  if (info) {
    details.innerHTML =
      "<h4>" + key + "</h4>" +
      "Minutes: " + info.minutes +
      "<br>Sessions: " + info.sessions +
      "<br>Notes:<br>" + info.notes.join("<br>");
  } else {
    details.innerHTML = "<h4>" + key + "</h4>No data.";
  }
}

function render() {
  let today = data[todayKey()];
  document.getElementById("todayStats").innerText =
    today ? "Today: " + today.minutes + " min | " + today.sessions + " sessions"
          : "No meditation today";

  document.getElementById("streak").innerText =
    "Current streak: " + calculateStreak() + " days";

  document.getElementById("monthlyTotal").innerText =
    "This month: " + monthlyMinutes() + " minutes";

  renderCalendar();
}

render();

</script>

</body>
</html>
